<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Master — Lexique</title>
<style>
:root{--primary:#667eea;--secondary:#764ba2;--success:#48bb78;--bg:#f7fafc;--text:#2d3748}
*{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",system-ui,sans-serif}
body{background:linear-gradient(135deg,var(--primary),var(--secondary));min-height:100vh;padding:15px}
.container{background:white;width:100%;max-width:920px;margin:0 auto;border-radius:20px;padding:25px;box-shadow:0 15px 40px rgba(0,0,0,.2)}
h1{text-align:center;color:var(--text);margin-bottom:5px;font-size:1.9em}
.subtitle{text-align:center;color:#718096;margin-bottom:20px;font-size:.95em}
.nav-links{display:flex;justify-content:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.nav-links a{padding:9px 18px;background:var(--primary);color:white;text-decoration:none;border-radius:20px;font-weight:bold;font-size:.9em;transition:all .25s}
.nav-links a:hover{background:var(--secondary);transform:translateY(-2px)}
.search-box{width:100%;padding:13px 18px;border:2px solid #e2e8f0;border-radius:12px;font-size:1em;margin-bottom:16px;outline:none;transition:border-color .2s}
.search-box:focus{border-color:var(--primary)}
.level-tabs{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
.level-tab{padding:7px 13px;border:2px solid var(--primary);background:white;color:var(--primary);border-radius:16px;cursor:pointer;font-weight:bold;font-size:.8em;transition:all .25s}
.level-tab:hover,.level-tab.active{background:var(--primary);color:white}
.lex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:13px}
.word-card{background:#f8fafc;border:2px solid transparent;border-radius:13px;padding:17px;cursor:pointer;transition:all .25s;position:relative}
.word-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.1);border-color:var(--primary)}
.word-en{font-size:1.2em;font-weight:bold;color:var(--primary);margin-bottom:4px}
.word-fr{font-size:.95em;color:var(--text);margin-bottom:7px}
.word-cat{font-size:.72em;color:#718096;background:#e2e8f0;padding:2px 9px;border-radius:9px;display:inline-block}
.word-lv{position:absolute;top:9px;right:9px;font-size:.68em;color:white;background:var(--secondary);padding:2px 7px;border-radius:7px}
.empty-msg{text-align:center;color:#999;padding:40px;grid-column:1/-1}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:2000;padding:15px}
.modal-overlay.show{display:flex}
.modal-content{background:white;border-radius:18px;padding:26px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;animation:popIn .25s ease}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.modal-en{font-size:1.9em;font-weight:bold;color:var(--primary);margin-bottom:4px}
.modal-fr{font-size:1.2em;color:var(--text);margin-bottom:14px}
.modal-sec{margin:12px 0;padding:12px 15px;background:#f7fafc;border-radius:10px}
.modal-sec h4{color:var(--secondary);margin-bottom:6px;font-size:.85em;text-transform:uppercase;letter-spacing:.5px}
.modal-close{background:var(--primary);color:white;border:none;padding:11px 22px;border-radius:20px;cursor:pointer;font-weight:bold;margin-top:13px;width:100%}
.stat-bar{text-align:center;font-size:.85em;color:#718096;margin-bottom:12px}
@media(max-width:600px){.lex-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
<h1>📖 Lexique English Master</h1>
<p class="subtitle">125 mots essentiels — Niveaux 1 à 10</p>
<div class="nav-links">
<a href="quiz.html">🎮 Retour au Quiz</a>
<a href="dashboard.html">📊 Mon Espace</a>

</div>
<div class="stat-bar" id="statBar">125 mots disponibles</div>
<input type="text" class="search-box" id="searchBox" placeholder="🔍 Chercher un mot en français ou en anglais…" oninput="filterWords()">
<div class="level-tabs">
  <button class="level-tab active" onclick="filterByLevel(0,this)">Tous</button>
  <button class="level-tab" onclick="filterByLevel(1,this)">Niv. 1</button>
  <button class="level-tab" onclick="filterByLevel(2,this)">Niv. 2</button>
  <button class="level-tab" onclick="filterByLevel(3,this)">Niv. 3</button>
  <button class="level-tab" onclick="filterByLevel(4,this)">Niv. 4</button>
  <button class="level-tab" onclick="filterByLevel(5,this)">Niv. 5</button>
  <button class="level-tab" onclick="filterByLevel(6,this)">Niv. 6</button>
  <button class="level-tab" onclick="filterByLevel(7,this)">Niv. 7</button>
  <button class="level-tab" onclick="filterByLevel(8,this)">Niv. 8</button>
  <button class="level-tab" onclick="filterByLevel(9,this)">Niv. 9</button>
  <button class="level-tab" onclick="filterByLevel(10,this)">Niv. 10</button>
</div>
<div class="lex-grid" id="lexGrid"></div>
</div>
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-en" id="modalEn"></div>
    <div class="modal-fr" id="modalFr"></div>
    <div class="modal-sec"><h4>📖 Définition</h4><p id="modalDef"></p></div>
    <div class="modal-sec"><h4>💬 Exemple</h4><p id="modalEx" style="font-style:italic"></p></div>
    <div class="modal-sec"><h4>📝 Catégorie</h4><p id="modalCat"></p></div>
    <button class="modal-close" onclick="closeModal()">Fermer</button>
  </div>
</div>

let currentLevel=0; let currentSearch="";

function renderWords(){
  const grid=document.getElementById("lexGrid");
  let filtered=LEXIQUE;
  if(currentLevel>0)filtered=filtered.filter(w=>w.level===currentLevel);
  if(currentSearch.trim()){
    const s=currentSearch.toLowerCase();
    filtered=filtered.filter(w=>w.en.toLowerCase().includes(s)||w.fr.toLowerCase().includes(s)||w.def.toLowerCase().includes(s));
  }
  document.getElementById("statBar").textContent=filtered.length+" mot"+(filtered.length>1?"s":"")+" affiché"+(filtered.length>1?"s":"");
  if(filtered.length===0){grid.innerHTML='<div class="empty-msg">Aucun mot trouvé. Essaie une autre recherche.</div>';return;}
  grid.innerHTML=filtered.map(w=>`
    <div class="word-card" onclick="openModal(${LEXIQUE.indexOf(w)})">
      <span class="word-lv">Niv.${w.level}</span>
      <div class="word-en">${w.en}</div>
      <div class="word-fr">${w.fr}</div>
      <span class="word-cat">${w.cat}</span>
    </div>`).join("");
}

function filterByLevel(lvl,btn){
  currentLevel=lvl;
  document.querySelectorAll(".level-tab").forEach(b=>b.classList.remove("active"));
  if(btn)btn.classList.add("active");
  renderWords();
}

function filterWords(){
  currentSearch=document.getElementById("searchBox").value;
  renderWords();
}

function openModal(idx){
  const w=LEXIQUE[idx];
  document.getElementById("modalEn").textContent=w.en;
  document.getElementById("modalFr").textContent=w.fr;
  document.getElementById("modalDef").textContent=w.def;
  document.getElementById("modalEx").textContent=w.ex;
  document.getElementById("modalCat").textContent=w.cat+" • Niveau "+w.level;
  document.getElementById("modal").classList.add("show");
}

function closeModal(e){
  if(!e||e.target.id==="modal")document.getElementById("modal").classList.remove("show");
}

document.addEventListener("DOMContentLoaded",()=>{
  const hash = window.location.hash.replace('#','');
  const params = new URLSearchParams(window.location.search);
  const lvlParam = params.get('level');
  if(hash){
    currentSearch = decodeURIComponent(hash);
    document.getElementById('searchBox').value = currentSearch;
  }
  if(lvlParam){
    currentLevel = parseInt(lvlParam);
    document.querySelectorAll('.level-tab').forEach(b=>b.classList.remove('active'));
    const tabs = document.querySelectorAll('.level-tab');
    if(tabs[currentLevel]) tabs[currentLevel].classList.add('active');
  }
  renderWords();
});
</script>
