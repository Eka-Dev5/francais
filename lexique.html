<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lexique – Français Master</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",system-ui,sans-serif}
        body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
        .container{max-width:1200px;margin:0 auto;background:white;border-radius:20px;padding:25px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        h1{color:#667eea;margin-bottom:10px;display:flex;align-items:center;gap:10px}
        .filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
        .filters input,.filters select{padding:10px 15px;border:2px solid #e2e8f0;border-radius:12px;font-size:1em;flex:1;min-width:150px}
        .lexique-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:15px}
        .card{background:#f8fafc;border-radius:12px;padding:15px;border-left:5px solid #667eea;transition:all .2s}
        .card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,0.1)}
        .fr{font-size:1.4em;font-weight:bold;color:#2d3748}
        .phon{color:#764ba2;font-style:italic;font-size:.9em;margin-left:8px}
        .en{color:#4a5568;margin:5px 0;font-size:.95em}
        .def{color:#718096;font-size:.85em;margin-top:8px;border-top:1px solid #e2e8f0;padding-top:6px}
        .level-badge{display:inline-block;background:#667eea;color:white;border-radius:20px;padding:2px 10px;font-size:.7em;margin-top:8px}
        .no-results{text-align:center;color:#718096;padding:40px}
    </style>
</head>
<body>
<div class="container">
    <h1>📖 Lexique Français Master <span style="font-size:0.8rem;">(243 mots)</span></h1>
    <div class="filters">
        <input type="text" id="searchInput" placeholder="🔍 Chercher un mot..." oninput="filterLexique()">
        <select id="levelFilter" onchange="filterLexique()">
            <option value="all">Tous les niveaux</option>
            <option value="1">Niveau 1</option><option value="2">Niveau 2</option><option value="3">Niveau 3</option>
            <option value="4">Niveau 4</option><option value="5">Niveau 5</option><option value="6">Niveau 6</option>
            <option value="7">Niveau 7</option><option value="8">Niveau 8</option><option value="9">Niveau 9</option>
            <option value="10">Niveau 10</option>
        </select>
    </div>
    <div id="lexiqueGrid" class="lexique-grid"></div>
</div>
<script src="BDDlexique.js"></script>
<script>
    function renderLexique(mots) {
        const grid = document.getElementById('lexiqueGrid');
        if (!mots.length) { grid.innerHTML = '<div class="no-results">Aucun mot trouvé.</div>'; return; }
        grid.innerHTML = mots.map(w => `
            <div class="card">
                <div><span class="fr">${w.fr}</span> <span class="phon">${w.phon || ''}</span></div>
                <div class="en">${w.en}</div>
                <div class="def">${w.def}<br><em>${w.ex}</em></div>
                <span class="level-badge">Niveau ${w.level}</span> <span style="font-size:0.75em;color:#a0aec0">${w.cat}</span>
            </div>
        `).join('');
    }
    function filterLexique() {
        if (typeof LEXIQUE_BDD === 'undefined') return;
        const search = document.getElementById('searchInput').value.toLowerCase();
        const level = document.getElementById('levelFilter').value;
        let filtered = LEXIQUE_BDD.filter(w => 
            w.fr.toLowerCase().includes(search) || w.en.toLowerCase().includes(search)
        );
        if (level !== 'all') filtered = filtered.filter(w => w.level == level);
        renderLexique(filtered);
    }
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof LEXIQUE_BDD !== 'undefined') renderLexique(LEXIQUE_BDD);
        else document.getElementById('lexiqueGrid').innerHTML = '<div class="no-results">❌ Base de données non chargée.</div>';
    });
</script>
</body>
</html>
