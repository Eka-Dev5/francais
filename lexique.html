<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Master — Lexique</title>
<style>
:root{--primary:#667eea;--secondary:#764ba2;--success:#48bb78;--bg:#f7fafc;--text:#2d3748}
*{box-sizing:border-box;margin:0;padding:0;font-family:"Segoe UI",system-ui,sans-serif}
body{background:linear-gradient(135deg,var(--primary),var(--secondary));min-height:100vh;padding:15px}
.container{background:white;width:100%;max-width:920px;margin:0 auto;border-radius:20px;padding:25px;box-shadow:0 15px 40px rgba(0,0,0,.2)}
h1{text-align:center;color:var(--text);margin-bottom:5px;font-size:1.9em}
.subtitle{text-align:center;color:#718096;margin-bottom:20px;font-size:.95em}
.nav-links{display:flex;justify-content:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.nav-links a{padding:9px 18px;background:var(--primary);color:white;text-decoration:none;border-radius:20px;font-weight:bold;font-size:.9em;transition:all .25s}
.nav-links a:hover{background:var(--secondary);transform:translateY(-2px)}
.search-box{width:100%;padding:13px 18px;border:2px solid #e2e8f0;border-radius:12px;font-size:1em;margin-bottom:16px;outline:none;transition:border-color .2s}
.search-box:focus{border-color:var(--primary)}
.level-tabs{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
.level-tab{padding:7px 13px;border:2px solid var(--primary);background:white;color:var(--primary);border-radius:16px;cursor:pointer;font-weight:bold;font-size:.8em;transition:all .25s}
.level-tab:hover,.level-tab.active{background:var(--primary);color:white}
.lex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:13px}
.word-card{background:#f8fafc;border:2px solid transparent;border-radius:13px;padding:17px;cursor:pointer;transition:all .25s;position:relative}
.word-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.1);border-color:var(--primary)}
.word-en{font-size:1.2em;font-weight:bold;color:var(--primary);margin-bottom:4px}
.word-fr{font-size:.95em;color:var(--text);margin-bottom:7px}
.word-cat{font-size:.72em;color:#718096;background:#e2e8f0;padding:2px 9px;border-radius:9px;display:inline-block}
.word-lv{position:absolute;top:9px;right:9px;font-size:.68em;color:white;background:var(--secondary);padding:2px 7px;border-radius:7px}
.empty-msg{text-align:center;color:#999;padding:40px;grid-column:1/-1}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:2000;padding:15px}
.modal-overlay.show{display:flex}
.modal-content{background:white;border-radius:18px;padding:26px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;animation:popIn .25s ease}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.modal-en{font-size:1.9em;font-weight:bold;color:var(--primary);margin-bottom:4px}
.modal-fr{font-size:1.2em;color:var(--text);margin-bottom:14px}
.modal-sec{margin:12px 0;padding:12px 15px;background:#f7fafc;border-radius:10px}
.modal-sec h4{color:var(--secondary);margin-bottom:6px;font-size:.85em;text-transform:uppercase;letter-spacing:.5px}
.modal-close{background:var(--primary);color:white;border:none;padding:11px 22px;border-radius:20px;cursor:pointer;font-weight:bold;margin-top:13px;width:100%}
.stat-bar{text-align:center;font-size:.85em;color:#718096;margin-bottom:12px}
@media(max-width:600px){.lex-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="container">
<h1>📖 Lexique English Master</h1>
<p class="subtitle">125 mots essentiels — Niveaux 1 à 10</p>
<div class="nav-links">
<a href="quiz.html">🎮 Retour au Quiz</a>
<a href="dashboard.html">📊 Mon Espace</a>

</div>
<div class="stat-bar" id="statBar">125 mots disponibles</div>
<input type="text" class="search-box" id="searchBox" placeholder="🔍 Chercher un mot en français ou en anglais…" oninput="filterWords()">
<div class="level-tabs">
  <button class="level-tab active" onclick="filterByLevel(0,this)">Tous</button>
  <button class="level-tab" onclick="filterByLevel(1,this)">Niv. 1</button>
  <button class="level-tab" onclick="filterByLevel(2,this)">Niv. 2</button>
  <button class="level-tab" onclick="filterByLevel(3,this)">Niv. 3</button>
  <button class="level-tab" onclick="filterByLevel(4,this)">Niv. 4</button>
  <button class="level-tab" onclick="filterByLevel(5,this)">Niv. 5</button>
  <button class="level-tab" onclick="filterByLevel(6,this)">Niv. 6</button>
  <button class="level-tab" onclick="filterByLevel(7,this)">Niv. 7</button>
  <button class="level-tab" onclick="filterByLevel(8,this)">Niv. 8</button>
  <button class="level-tab" onclick="filterByLevel(9,this)">Niv. 9</button>
  <button class="level-tab" onclick="filterByLevel(10,this)">Niv. 10</button>
</div>
<div class="lex-grid" id="lexGrid"></div>
</div>
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-en" id="modalEn"></div>
    <div class="modal-fr" id="modalFr"></div>
    <div class="modal-sec"><h4>📖 Définition</h4><p id="modalDef"></p></div>
    <div class="modal-sec"><h4>💬 Exemple</h4><p id="modalEx" style="font-style:italic"></p></div>
    <div class="modal-sec"><h4>📝 Catégorie</h4><p id="modalCat"></p></div>
    <button class="modal-close" onclick="closeModal()">Fermer</button>
  </div>
</div>
<script>
// ═══════ BASE DE DONNÉES DU LEXIQUE ═══════
// Pour mettre à jour : ajouter des objets ici avec le même format
// {en:"mot",fr:"traduction",def:"définition",ex:"exemple",level:N,cat:"catégorie"}
const LEXIQUE = [
  // NIVEAU 1
  {en:"be",fr:"être",def:"Verbe d'état (identité, état, localisation).",ex:"I am a student.",level:1,cat:"verbe"},
  {en:"have",fr:"avoir",def:"Verbe de possession ou d'expérience.",ex:"I have a cat.",level:1,cat:"verbe"},
  {en:"student",fr:"étudiant",def:"Personne qui étudie à l'école.",ex:"She is a student.",level:1,cat:"nom"},
  {en:"happy",fr:"heureux",def:"Qui ressent de la joie.",ex:"They are happy.",level:1,cat:"adjectif"},
  {en:"tired",fr:"fatigué",def:"Qui manque d'énergie.",ex:"I am tired today.",level:1,cat:"adjectif"},
  {en:"doctor",fr:"docteur",def:"Personne qui soigne les malades.",ex:"He is a doctor.",level:1,cat:"nom"},
  {en:"teacher",fr:"professeur",def:"Personne qui enseigne.",ex:"She is a teacher.",level:1,cat:"nom"},
  {en:"parents",fr:"parents",def:"Le père et la mère.",ex:"My parents are nice.",level:1,cat:"nom"},
  {en:"sister",fr:"sœur",def:"Fille ayant les mêmes parents.",ex:"She is my sister.",level:1,cat:"nom"},
  {en:"brother",fr:"frère",def:"Garçon ayant les mêmes parents.",ex:"He is my brother.",level:1,cat:"nom"},
  {en:"house",fr:"maison",def:"Bâtiment où vit une famille.",ex:"It is a big house.",level:1,cat:"nom"},
  {en:"eyes",fr:"yeux",def:"Organes de la vue.",ex:"She has blue eyes.",level:1,cat:"nom"},
  {en:"family",fr:"famille",def:"Groupe lié par le sang.",ex:"We have a big family.",level:1,cat:"nom"},
  // NIVEAU 2
  {en:"watch",fr:"regarder",def:"Diriger son attention vers quelque chose.",ex:"He watches TV every day.",level:2,cat:"verbe"},
  {en:"play",fr:"jouer",def:"S'amuser ou pratiquer un sport.",ex:"They play football on Sundays.",level:2,cat:"verbe"},
  {en:"drink",fr:"boire",def:"Avaler un liquide.",ex:"I don't drink coffee.",level:2,cat:"verbe"},
  {en:"eat",fr:"manger",def:"Consommer de la nourriture.",ex:"We don't eat meat.",level:2,cat:"verbe"},
  {en:"speak",fr:"parler",def:"Communiquer à l'oral.",ex:"She speaks English very well.",level:2,cat:"verbe"},
  {en:"work",fr:"travailler",def:"Effectuer une tâche.",ex:"Does he work in Paris?",level:2,cat:"verbe"},
  {en:"live",fr:"habiter",def:"Résider dans un lieu.",ex:"Where does she live?",level:2,cat:"verbe"},
  {en:"always",fr:"toujours",def:"À chaque occasion, sans exception.",ex:"I always eat breakfast.",level:2,cat:"adverbe"},
  {en:"never",fr:"jamais",def:"À aucun moment.",ex:"I never arrive late.",level:2,cat:"adverbe"},
  {en:"often",fr:"souvent",def:"Fréquemment.",ex:"Does it rain often?",level:2,cat:"adverbe"},
  {en:"study",fr:"étudier",def:"Apprendre en travaillant sur un sujet.",ex:"She studies English.",level:2,cat:"verbe"},
  {en:"brush",fr:"brosser",def:"Nettoyer avec une brosse.",ex:"I brush my teeth twice a day.",level:2,cat:"verbe"},
  // NIVEAU 3
  {en:"sleep",fr:"dormir",def:"Être dans un état de repos.",ex:"The cat is sleeping on the sofa.",level:3,cat:"verbe"},
  {en:"listen",fr:"écouter",def:"Prêter attention à un son.",ex:"I am listening to music.",level:3,cat:"verbe"},
  {en:"cook",fr:"cuisiner",def:"Préparer de la nourriture.",ex:"She is cooking dinner.",level:3,cat:"verbe"},
  {en:"read",fr:"lire",def:"Décoder et comprendre l'écrit.",ex:"I am reading a book.",level:3,cat:"verbe"},
  {en:"rain",fr:"pleuvoir",def:"Tomber des gouttes d'eau du ciel.",ex:"It is raining outside.",level:3,cat:"verbe"},
  {en:"talk",fr:"parler",def:"Tenir une conversation.",ex:"She is talking on the phone.",level:3,cat:"verbe"},
  {en:"wait",fr:"attendre",def:"Rester en prévision de quelque chose.",ex:"Are you waiting for someone?",level:3,cat:"verbe"},
  {en:"swim",fr:"nager",def:"Se déplacer dans l'eau.",ex:"They are swimming in the pool.",level:3,cat:"verbe"},
  {en:"write",fr:"écrire",def:"Tracer des lettres ou des mots.",ex:"He is writing a letter.",level:3,cat:"verbe"},
  {en:"now",fr:"maintenant",def:"À ce moment précis.",ex:"I am busy now.",level:3,cat:"adverbe"},
  {en:"right now",fr:"en ce moment",def:"Exactement maintenant.",ex:"She is eating right now.",level:3,cat:"expression"},
  {en:"at the moment",fr:"pour le moment",def:"Actuellement.",ex:"He is working at the moment.",level:3,cat:"expression"},
  // NIVEAU 4
  {en:"question",fr:"question",def:"Phrase interrogative.",ex:"Do you like pizza?",level:4,cat:"nom"},
  {en:"yesterday",fr:"hier",def:"Le jour précédent.",ex:"Did he go yesterday?",level:4,cat:"adverbe"},
  {en:"last week",fr:"la semaine dernière",def:"La semaine qui vient de passer.",ex:"Where did you go last week?",level:4,cat:"expression"},
  {en:"like",fr:"aimer",def:"Éprouver de l'appréciation pour.",ex:"Do you like pizza?",level:4,cat:"verbe"},
  {en:"want",fr:"vouloir",def:"Désirer quelque chose.",ex:"They don't want to come.",level:4,cat:"verbe"},
  {en:"know",fr:"savoir / connaître",def:"Avoir une information en mémoire.",ex:"Does he know the answer?",level:4,cat:"verbe"},
  {en:"think",fr:"penser",def:"Avoir une opinion.",ex:"I don't think so.",level:4,cat:"verbe"},
  {en:"see",fr:"voir",def:"Percevoir avec les yeux.",ex:"Did you see that film?",level:4,cat:"verbe"},
  {en:"call",fr:"appeler",def:"Téléphoner à quelqu'un.",ex:"Did she call you?",level:4,cat:"verbe"},
  // NIVEAU 5
  {en:"was",fr:"étais / était",def:"Forme passée de BE (I/he/she/it).",ex:"I was happy yesterday.",level:5,cat:"verbe"},
  {en:"were",fr:"étaient / étiez",def:"Forme passée de BE (you/we/they).",ex:"They were at the cinema.",level:5,cat:"verbe"},
  {en:"ago",fr:"il y a",def:"Indique un temps passé.",ex:"2 years ago",level:5,cat:"adverbe"},
  {en:"sick",fr:"malade",def:"Qui souffre d'une maladie.",ex:"She was sick last week.",level:5,cat:"adjectif"},
  {en:"angry",fr:"en colère",def:"Qui éprouve de la colère.",ex:"Was she angry?",level:5,cat:"adjectif"},
  {en:"ready",fr:"prêt",def:"Préparé pour une action.",ex:"Were they ready?",level:5,cat:"adjectif"},
  {en:"late",fr:"en retard",def:"Qui arrive après l'heure.",ex:"He was late for work.",level:5,cat:"adjectif"},
  {en:"weather",fr:"météo",def:"État de l'atmosphère.",ex:"The weather was beautiful.",level:5,cat:"nom"},
  // NIVEAU 6
  {en:"went",fr:"est allé",def:"Passé de GO (aller).",ex:"Yesterday I went to the shop.",level:6,cat:"verbe"},
  {en:"sang",fr:"a chanté",def:"Passé de SING (chanter).",ex:"She sang a beautiful song.",level:6,cat:"verbe"},
  {en:"ate",fr:"a mangé",def:"Passé de EAT (manger).",ex:"They ate pizza for dinner.",level:6,cat:"verbe"},
  {en:"broke",fr:"a cassé",def:"Passé de BREAK (casser).",ex:"He broke his leg.",level:6,cat:"verbe"},
  {en:"took",fr:"a pris",def:"Passé de TAKE (prendre).",ex:"We took the bus.",level:6,cat:"verbe"},
  {en:"wrote",fr:"a écrit",def:"Passé de WRITE (écrire).",ex:"I wrote a letter.",level:6,cat:"verbe"},
  {en:"told",fr:"a dit",def:"Passé de TELL (dire).",ex:"She told me a secret.",level:6,cat:"verbe"},
  {en:"lost",fr:"a perdu",def:"Passé de LOSE (perdre).",ex:"I lost my keys.",level:6,cat:"verbe"},
  {en:"bought",fr:"a acheté",def:"Passé de BUY (acheter).",ex:"She bought a new dress.",level:6,cat:"verbe"},
  {en:"had",fr:"a eu",def:"Passé de HAVE (avoir).",ex:"We had a great time.",level:6,cat:"verbe"},
  {en:"saw",fr:"a vu",def:"Passé de SEE (voir).",ex:"I saw him yesterday.",level:6,cat:"verbe"},
  {en:"heard",fr:"a entendu",def:"Passé de HEAR (entendre).",ex:"They heard a noise.",level:6,cat:"verbe"},
  {en:"came",fr:"est venu",def:"Passé de COME (venir).",ex:"They came home late.",level:6,cat:"verbe"},
  // NIVEAU 7
  {en:"will",fr:"va (futur)",def:"Auxiliaire du futur simple.",ex:"I think it will rain.",level:7,cat:"modal"},
  {en:"going to",fr:"va (intention)",def:"Futur proche / plan / intention.",ex:"It is going to rain.",level:7,cat:"expression"},
  {en:"tomorrow",fr:"demain",def:"Le jour suivant.",ex:"I will call you tomorrow.",level:7,cat:"adverbe"},
  {en:"soon",fr:"bientôt",def:"Dans un avenir proche.",ex:"They are going to move soon.",level:7,cat:"adverbe"},
  {en:"later",fr:"plus tard",def:"À un moment ultérieur.",ex:"I will call you later.",level:7,cat:"adverbe"},
  {en:"promise",fr:"promesse",def:"Engagement de faire quelque chose.",ex:"I promise I will not be late.",level:7,cat:"nom"},
  {en:"plan",fr:"plan",def:"Organisation prévue pour le futur.",ex:"We have a plan.",level:7,cat:"nom"},
  {en:"probably",fr:"probablement",def:"Selon toute vraisemblance.",ex:"It will probably rain.",level:7,cat:"adverbe"},
  // NIVEAU 8
  {en:"have been",fr:"ai été / suis allé",def:"Present Perfect avec BE (expérience).",ex:"I have never been to Paris.",level:8,cat:"verbe"},
  {en:"already",fr:"déjà",def:"Avant le moment présent.",ex:"We have already eaten.",level:8,cat:"adverbe"},
  {en:"yet",fr:"encore / déjà",def:"Utilisé en fin de phrase (PP).",ex:"Have you finished yet?",level:8,cat:"adverbe"},
  {en:"just",fr:"juste / à l'instant",def:"Il y a très peu de temps.",ex:"He has just left.",level:8,cat:"adverbe"},
  {en:"since",fr:"depuis",def:"À partir d'un point dans le temps.",ex:"She has worked here since 2020.",level:8,cat:"préposition"},
  {en:"for",fr:"depuis (durée)",def:"Indique une durée.",ex:"They have lived here for 10 years.",level:8,cat:"préposition"},
  {en:"ever",fr:"déjà (question)",def:"Dans les questions sur l'expérience.",ex:"Have you ever been to London?",level:8,cat:"adverbe"},
  {en:"recently",fr:"récemment",def:"Il y a peu de temps.",ex:"I have recently lost my keys.",level:8,cat:"adverbe"},
  {en:"twice",fr:"deux fois",def:"À deux reprises.",ex:"I have seen this film twice.",level:8,cat:"adverbe"},
  // NIVEAU 9
  {en:"can",fr:"pouvoir / savoir",def:"Capacité ou permission informelle.",ex:"I can swim very well.",level:9,cat:"modal"},
  {en:"must",fr:"devoir (fort)",def:"Obligation forte ou nécessité.",ex:"You must stop smoking.",level:9,cat:"modal"},
  {en:"should",fr:"devoir (conseil)",def:"Conseil ou recommandation.",ex:"You should see a doctor.",level:9,cat:"modal"},
  {en:"might",fr:"pourrait",def:"Possibilité faible ou incertitude.",ex:"He might be at home.",level:9,cat:"modal"},
  {en:"may",fr:"pouvoir (permission)",def:"Permission formelle.",ex:"May I come in?",level:9,cat:"modal"},
  {en:"could",fr:"pourrait (passé / poli)",def:"Capacité dans le passé ou demande polie.",ex:"Could you help me?",level:9,cat:"modal"},
  {en:"permission",fr:"permission",def:"Autorisation de faire quelque chose.",ex:"Can I go out?",level:9,cat:"nom"},
  {en:"advice",fr:"conseil",def:"Recommandation pour agir.",ex:"You should eat vegetables.",level:9,cat:"nom"},
  {en:"ability",fr:"capacité",def:"Ce qu'on est capable de faire.",ex:"She can play the piano.",level:9,cat:"nom"},
  {en:"obligation",fr:"obligation",def:"Ce qu'on est contraint de faire.",ex:"I must finish this today.",level:9,cat:"nom"},
  // NIVEAU 10
  {en:"if",fr:"si",def:"Introduit une condition.",ex:"If it rains, I will stay home.",level:10,cat:"conjonction"},
  {en:"unless",fr:"sauf si / à moins que",def:"Condition négative (if not).",ex:"I won't go unless you come.",level:10,cat:"conjonction"},
  {en:"although",fr:"bien que / malgré",def:"Introduit une concession.",ex:"Although it is raining, we go out.",level:10,cat:"conjonction"},
  {en:"because",fr:"parce que",def:"Introduit une cause.",ex:"She is late because of the traffic.",level:10,cat:"conjonction"},
  {en:"until",fr:"jusqu'à ce que",def:"Indique la limite temporelle.",ex:"We will stay until it stops.",level:10,cat:"conjonction"},
  {en:"as soon as",fr:"dès que",def:"Immédiatement après.",ex:"I will call you as soon as I arrive.",level:10,cat:"expression"},
  {en:"would",fr:"conditionnel",def:"Forme conditionnelle de WILL.",ex:"If I were you, I would go.",level:10,cat:"modal"},
  {en:"condition",fr:"condition",def:"Ce qui doit être réalisé.",ex:"If you heat water, it boils.",level:10,cat:"nom"},
  {en:"traffic",fr:"trafic",def:"Mouvement des véhicules.",ex:"The traffic was bad.",level:10,cat:"nom"}
];

let currentLevel=0; let currentSearch="";

function renderWords(){
  const grid=document.getElementById("lexGrid");
  let filtered=LEXIQUE;
  if(currentLevel>0)filtered=filtered.filter(w=>w.level===currentLevel);
  if(currentSearch.trim()){
    const s=currentSearch.toLowerCase();
    filtered=filtered.filter(w=>w.en.toLowerCase().includes(s)||w.fr.toLowerCase().includes(s)||w.def.toLowerCase().includes(s));
  }
  document.getElementById("statBar").textContent=filtered.length+" mot"+(filtered.length>1?"s":"")+" affiché"+(filtered.length>1?"s":"");
  if(filtered.length===0){grid.innerHTML='<div class="empty-msg">Aucun mot trouvé. Essaie une autre recherche.</div>';return;}
  grid.innerHTML=filtered.map(w=>`
    <div class="word-card" onclick="openModal(${LEXIQUE.indexOf(w)})">
      <span class="word-lv">Niv.${w.level}</span>
      <div class="word-en">${w.en}</div>
      <div class="word-fr">${w.fr}</div>
      <span class="word-cat">${w.cat}</span>
    </div>`).join("");
}

function filterByLevel(lvl,btn){
  currentLevel=lvl;
  document.querySelectorAll(".level-tab").forEach(b=>b.classList.remove("active"));
  if(btn)btn.classList.add("active");
  renderWords();
}

function filterWords(){
  currentSearch=document.getElementById("searchBox").value;
  renderWords();
}

function openModal(idx){
  const w=LEXIQUE[idx];
  document.getElementById("modalEn").textContent=w.en;
  document.getElementById("modalFr").textContent=w.fr;
  document.getElementById("modalDef").textContent=w.def;
  document.getElementById("modalEx").textContent=w.ex;
  document.getElementById("modalCat").textContent=w.cat+" • Niveau "+w.level;
  document.getElementById("modal").classList.add("show");
}

function closeModal(e){
  if(!e||e.target.id==="modal")document.getElementById("modal").classList.remove("show");
}

document.addEventListener("DOMContentLoaded",()=>{
  const hash = window.location.hash.replace('#','');
  const params = new URLSearchParams(window.location.search);
  const lvlParam = params.get('level');
  if(hash){
    currentSearch = decodeURIComponent(hash);
    document.getElementById('searchBox').value = currentSearch;
  }
  if(lvlParam){
    currentLevel = parseInt(lvlParam);
    document.querySelectorAll('.level-tab').forEach(b=>b.classList.remove('active'));
    const tabs = document.querySelectorAll('.level-tab');
    if(tabs[currentLevel]) tabs[currentLevel].classList.add('active');
  }
  renderWords();
});
</script>
</body>
</html>
